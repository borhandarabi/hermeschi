# HermesChi + Agent — Docker Compose Setup (Core — no game module)
#
# This is the default compose file. It uses the core image (without game)
# which is lighter and suitable for production workspaces.
#
# For the full version (with game module), use:
#   docker compose -f docker-compose.yml -f docker-compose.full.yml up
#
# Requirements:
#   - Docker & Docker Compose
#   - At least one LLM provider key in .env
#
# Quick Start:
#   1. cp .env.example .env
#   2. Add at least one provider key
#   3. docker compose up
#   4. Open http://localhost:3000
#
# Images:
#   - nousresearch/hermes-agent:latest  (Hermes Agent gateway)
#   - ghcr.io/borhandarabi/hermeschi:latest  (this workspace, core build)
#
# Persistent data:
#   `hermes-agent-data` — agent config, sessions, skills, memory
#   `hermeschi-files` — files created from the Workspace file browser

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["gateway", "run"]
    env_file:
      - .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      HERMES_UID: '10010'
      HERMES_DASHBOARD: '1'
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: '9119'
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_ENABLED: 'true'
    volumes:
      - hermes-agent-data:/opt/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8642/health && curl -fsS http://localhost:9119/api/status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - '127.0.0.1:8642:8642'

  hermeschi:
    image: ghcr.io/borhandarabi/hermeschi:latest
    restart: unless-stopped
    depends_on:
      hermes-agent:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HERMES_HOME: /home/workspace/.hermes
      HERMESCHI_WORKSPACE_DIR: /workspace
      HERMES_API_URL: http://hermes-agent:8642
      HERMESCHI_DASHBOARD_URL: http://hermes-agent:9119
      HERMES_API_TOKEN: ${API_SERVER_KEY:-}
      HERMESCHI_PASSWORD: ${HERMESCHI_PASSWORD:-${CLAUDE_PASSWORD:-}}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
    volumes:
      - hermes-agent-data:/home/workspace/.hermes
      - hermeschi-files:/workspace
    ports:
      - '127.0.0.1:3000:3000'

volumes:
  hermes-agent-data:
  hermeschi-files:
