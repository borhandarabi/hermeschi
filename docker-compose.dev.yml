# HermesChi — Development Overlay
#
# Builds the workspace image from local source instead of pulling
# pre-built images. Use when iterating on code.
#
# Usage (core build, no game):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Usage (full build, with game):
#   docker compose -f docker-compose.yml -f docker-compose.full.yml -f docker-compose.dev.yml up --build
#
# The Hermes Agent service uses the canonical upstream image.

services:
  hermeschi:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        # Set to '1' to build with game module
        VITE_ENABLE_HERMESCHIWORLD: '0'
